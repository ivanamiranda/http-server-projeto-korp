services:
  http-server-projeto-korp:
    build: .
    container_name: http-server-projeto-korp
    expose:
      - "8080"
    networks:
      - korp-network

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/http-server-projeto-korp.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - http-server-projeto-korp
    networks:
      - korp-network

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - korp-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - korp-network

networks:
  korp-network:
    driver: bridge